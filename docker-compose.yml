services:
  born2works:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://bornworks.biz.id}
        WHATSAPP_NO: ${WHATSAPP_NO:-}
    image: born2works:latest
    container_name: born2works
    restart: unless-stopped
    # Bind to loopback only — reachable through nginx, never exposed publicly.
    ports:
      - "127.0.0.1:3002:3000"
    env_file:
      - .env
    environment:
      CMS_ENABLED:  ${CMS_ENABLED:-true}
      CMS_API_URL:  ${CMS_API_URL:-http://host.docker.internal:3010}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-}
