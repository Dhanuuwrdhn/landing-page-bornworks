name: Deploy to hermes

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: deploy-hermes
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          HERMES_HOST: ${{ secrets.HERMES_HOST }}
          HERMES_USER: ${{ secrets.HERMES_USER }}
          HERMES_SSH_KEY: ${{ secrets.HERMES_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$HERMES_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HERMES_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes "$HERMES_USER@$HERMES_HOST" bash -s <<'EOF'
          set -euo pipefail
          cd ~/work/born2works
          git fetch origin main
          git clean -fd            # drop untracked build files; .env is gitignored so it survives
          git reset --hard origin/main
          docker compose up -d --build
          docker image prune -f
          echo "Deployed: $(git rev-parse --short HEAD)"
          EOF
